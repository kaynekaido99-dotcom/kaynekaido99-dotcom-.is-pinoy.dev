name: Validate

on:
  pull_request:

jobs:
  validate:
    name: Validate Subdomains
    runs-on: ubuntu-latest
    steps:
      - name: Checkout domains
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@is-pinoy-dev"

      - name: Install CLI
        run: npm install -g @is-pinoy-dev/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate subdomain ownership
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --jq '.[].filename | select(startswith("subdomains/") and endswith(".json"))')
          failed=false
          for file in $files; do
            owner=$(jq -r '.owner.github' "$file")
            if [ "$owner" != "$PR_AUTHOR" ]; then
              echo "Error: $file — owner.github \"$owner\" does not match PR author \"$PR_AUTHOR\""
              failed=true
            fi
          done
          [ "$failed" = "true" ] && exit 1 || exit 0

      - name: Validate subdomains
        run: is-pinoy registry validate --dir ./subdomains
